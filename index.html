    <script>
        /* ── MENU NAVIGATION ── */
        const items = document.querySelectorAll('.menu-item');
        let activeIdx = 0;

        function update() {
            items.forEach((item, i) => {
                item.dataset.pos = i - activeIdx;
                item.classList.toggle('active', i === activeIdx);
            });
        }

        function go() {
            const href = items[activeIdx]?.dataset.href;
            if (href) window.location.href = href;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx + 1, items.length - 1); update(); e.preventDefault(); }
            else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx - 1, 0); update(); e.preventDefault(); }
            else if (e.key === 'Enter') { go(); e.preventDefault(); }
            else if (e.key === 'Escape') { lightbox.classList.remove('open'); }
        });

        items.forEach((item, i) => {
            item.addEventListener('mouseenter', () => { activeIdx = i; update(); });
            item.addEventListener('click', () => { activeIdx = i; update(); go(); });
        });

        update();

        /* ── SONG OF THE DAY ── */
        const TRACKS = [
            // BJam playlist
            { title: "Funky Galileo",               artist: "Sure Sure" },
            { title: "As the World Caves In",        artist: "Matt Maltese" },
            { title: "24 / 7 / 365",                artist: "Surfaces" },
            { title: "Television / So Far So Good",  artist: "Rex Orange County" },
            { title: "Best Friend",                  artist: "Rex Orange County" },
            { title: "Always",                       artist: "Rex Orange County" },
            { title: "Sunflower",                    artist: "Rex Orange County" },
            { title: "Cherry Wine",                  artist: "grentperez" },
            { title: "Clementine",                   artist: "grentperez" },
            { title: "Dark Red",                     artist: "Steve Lacy" },
            { title: "Dangerous",                    artist: "Michael Jackson" },
            { title: "Only If",                      artist: "Steve Lacy" },
            { title: "N Side",                       artist: "Steve Lacy" },
            { title: "Infrunami",                    artist: "Steve Lacy" },
            { title: "Static",                       artist: "Steve Lacy" },
            { title: "Some",                         artist: "Steve Lacy" },
            { title: "Chamber of Reflection",        artist: "Mac DeMarco" },
            { title: "White Ferrari",                artist: "Frank Ocean" },
            { title: "Heroes",                       artist: "David Bowie" },
            { title: "Lost Ones",                    artist: "Ms. Lauryn Hill" },
            { title: "Heaven Can Wait",              artist: "Michael Jackson" },
            { title: "Leave the Door Open",          artist: "Silk Sonic" },
            { title: "The Chain",                    artist: "Fleetwood Mac" },
            { title: "Jigsaw Falling Into Place",    artist: "Radiohead" },
            // 2017jam playlist
            { title: "Miss the Rage",                artist: "Trippie Redd" },
            { title: "Shoota",                       artist: "Playboi Carti" },
            { title: "XO Tour Llif3",               artist: "Lil Uzi Vert" },
            { title: "Myron",                        artist: "Lil Uzi Vert" },
            { title: "Hurricane",                    artist: "Kanye West" },
            { title: "Off the Grid",                 artist: "Kanye West" },
            { title: "Sky",                          artist: "Playboi Carti" },
            { title: "Bound 2",                      artist: "Kanye West" },
            { title: "lost souls",                   artist: "Baby Keem" },
            { title: "range brothers",               artist: "Baby Keem" },
            { title: "Alright",                      artist: "Kendrick Lamar" },
            { title: "Location",                     artist: "Playboi Carti" },
            { title: "wokeuplikethis*",              artist: "Playboi Carti" },
            { title: "Monëy so big",                artist: "Yeat" },
            { title: "16",                           artist: "Baby Keem" },
            { title: "Yessirskiii",                  artist: "Lil Uzi Vert" },
        ];

        async function loadSOTD() {
            const now = new Date();
            const dayOfYear = Math.floor(
                (Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()) - Date.UTC(now.getFullYear(), 0, 0))
                / 86400000
            );
            const track = TRACKS[dayOfYear % TRACKS.length];
            setTicker(`${track.title}  —  ${track.artist}`);
            try {
                const q = encodeURIComponent(`${track.title} ${track.artist}`);
                const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const r = data.results[0];
                    if (r.previewUrl) document.getElementById('sotdAudio').src = r.previewUrl;
                    setTicker(`${r.trackName}  —  ${r.artistName}`);
                }
            } catch (_) {}
        }

        function setTicker(text) {
            const el = document.getElementById('sotdTitle');
            if (el) el.textContent = text;
        }

        loadSOTD();

        /* ── SONG PLAYER ── */
        const sotdAudio = document.getElementById('sotdAudio');
        const sotdPlayBtn = document.getElementById('sotdPlay');
        const sotdVolumeInput = document.getElementById('sotdVolume');

        sotdPlayBtn.addEventListener('click', () => {
            if (sotdAudio.paused) {
                sotdAudio.play();
                sotdPlayBtn.textContent = '⏸';
                sotdPlayBtn.classList.add('playing');
            } else {
                sotdAudio.pause();
                sotdPlayBtn.textContent = '▶';
                sotdPlayBtn.classList.remove('playing');
            }
        });

        sotdAudio.addEventListener('ended', () => {
            sotdPlayBtn.textContent = '▶';
            sotdPlayBtn.classList.remove('playing');
        });

        sotdVolumeInput.addEventListener('input', () => {
            sotdAudio.volume = parseFloat(sotdVolumeInput.value);
        });

        /* ── DRAGGABLE IMAGES + LIGHTBOX ── */
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('open');
        }

        lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

        // Single shared mouse-move/up handler to avoid per-element window listeners
        let activeDrag = null;

        window.addEventListener('mousemove', e => {
            if (!activeDrag) return;
            activeDrag.move(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            if (!activeDrag) return;
            activeDrag.end();
            activeDrag = null;
        });

        document.querySelectorAll('.scatter').forEach(el => {
            let startX, startY, baseLeft, baseTop;
            let moved = false;
            let longPressTimer = null;
            let touchDragging = false;

            function initDrag(cx, cy) {
                const parentRect = el.offsetParent.getBoundingClientRect();
                const elRect = el.getBoundingClientRect();
                baseLeft = elRect.left - parentRect.left;
                baseTop  = elRect.top  - parentRect.top;
                startX = cx; startY = cy;
                moved = false;
                // Lock position to pixels so CSS rules don't fight JS
                el.style.left       = baseLeft + 'px';
                el.style.top        = baseTop  + 'px';
                el.style.right      = 'auto';
                el.style.bottom     = 'auto';
                el.style.zIndex     = '200';
                el.style.transition = 'none';
                document.body.style.userSelect = 'none';
            }

            function applyMove(cx, cy) {
                const dx = cx - startX, dy = cy - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
                el.style.left = (baseLeft + dx) + 'px';
                el.style.top  = (baseTop  + dy) + 'px';
            }

            function finishDrag() {
                el.style.zIndex     = '50'; // stays above non-dragged images
                el.style.transition = '';
                document.body.style.userSelect = '';
                if (!moved) openLightbox(el.currentSrc || el.src);
            }

            /* ── mouse (desktop) ── */
            el.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                initDrag(e.clientX, e.clientY);
                activeDrag = { move: applyMove, end: finishDrag };
                e.preventDefault();
            });

            /* ── touch (mobile) ── */
            el.addEventListener('touchstart', e => {
                const t = e.touches[0];
                startX = t.clientX; startY = t.clientY;
                moved = false; touchDragging = false;
                longPressTimer = setTimeout(() => {
                    touchDragging = true;
                    initDrag(t.clientX, t.clientY);
                }, 500);
            }, { passive: true });

            el.addEventListener('touchmove', e => {
                const t = e.touches[0];
                const dx = t.clientX - startX, dy = t.clientY - startY;
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    moved = true;
                    if (!touchDragging) clearTimeout(longPressTimer);
                }
                if (touchDragging) {
                    applyMove(t.clientX, t.clientY);
                    e.preventDefault();
                }
            }, { passive: false });

            el.addEventListener('touchend', () => {
                clearTimeout(longPressTimer);
                if (touchDragging) {
                    finishDrag();
                    touchDragging = false;
                } else if (!moved) {
                    openLightbox(el.currentSrc || el.src);
                }
            });
        });
    </script>

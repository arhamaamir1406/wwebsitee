    <script>
        /* ── MENU NAVIGATION ── */
        const items = document.querySelectorAll('.menu-item');
        let activeIdx = 0;

        function update() {
            items.forEach((item, i) => {
                item.dataset.pos = i - activeIdx;
                item.classList.toggle('active', i === activeIdx);
            });
        }

        function go() {
            const href = items[activeIdx]?.dataset.href;
            if (href) window.location.href = href;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx + 1, items.length - 1); update(); e.preventDefault(); }
            else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx - 1, 0); update(); e.preventDefault(); }
            else if (e.key === 'Enter') { go(); e.preventDefault(); }
            else if (e.key === 'Escape') { lightbox.classList.remove('open'); }
        });

        items.forEach((item, i) => {
            item.addEventListener('mouseenter', () => { activeIdx = i; update(); });
            item.addEventListener('click', () => { activeIdx = i; update(); go(); });
        });

        update();

        /* ── HELLO LETTER FLIP ── */
        document.querySelectorAll('.hello-letter').forEach(letter => {
            let resetTimer = null;

            letter.addEventListener('mouseenter', () => {
                clearTimeout(resetTimer);
                letter.classList.toggle('flipped');
                if (letter.classList.contains('flipped')) {
                    resetTimer = setTimeout(() => {
                        letter.classList.remove('flipped');
                    }, 7000);
                }
            });
        });

        /* ── DRAGGABLE IMAGES + LIGHTBOX ── */
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('open');
        }

        lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

        // Single shared mouse-move/up handler to avoid per-element window listeners
        let activeDrag = null;

        window.addEventListener('mousemove', e => {
            if (!activeDrag) return;
            activeDrag.move(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            if (!activeDrag) return;
            activeDrag.end();
            activeDrag = null;
        });

        document.querySelectorAll('.scatter').forEach(el => {
            let startX, startY, baseLeft, baseTop;
            let moved = false;
            let longPressTimer = null;
            let touchDragging = false;

            function initDrag(cx, cy) {
                const parentRect = el.offsetParent.getBoundingClientRect();
                const elRect = el.getBoundingClientRect();
                baseLeft = elRect.left - parentRect.left;
                baseTop  = elRect.top  - parentRect.top;
                startX = cx; startY = cy;
                moved = false;
                // Lock position to pixels so CSS rules don't fight JS
                el.style.left       = baseLeft + 'px';
                el.style.top        = baseTop  + 'px';
                el.style.right      = 'auto';
                el.style.bottom     = 'auto';
                el.style.zIndex     = '200';
                el.style.transition = 'none';
                document.body.style.userSelect = 'none';
            }

            function applyMove(cx, cy) {
                const dx = cx - startX, dy = cy - startY;
                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
                el.style.left = (baseLeft + dx) + 'px';
                el.style.top  = (baseTop  + dy) + 'px';
            }

            function finishDrag() {
                el.style.zIndex     = '50'; // stays above non-dragged images
                el.style.transition = '';
                document.body.style.userSelect = '';
                if (!moved) openLightbox(el.currentSrc || el.src);
            }

            /* ── mouse (desktop) ── */
            el.addEventListener('mousedown', e => {
                if (e.button !== 0) return;
                initDrag(e.clientX, e.clientY);
                activeDrag = { move: applyMove, end: finishDrag };
                e.preventDefault();
            });

            /* ── touch (mobile) ── */
            el.addEventListener('touchstart', e => {
                const t = e.touches[0];
                startX = t.clientX; startY = t.clientY;
                moved = false; touchDragging = false;
                longPressTimer = setTimeout(() => {
                    touchDragging = true;
                    initDrag(t.clientX, t.clientY);
                }, 500);
            }, { passive: true });

            el.addEventListener('touchmove', e => {
                const t = e.touches[0];
                const dx = t.clientX - startX, dy = t.clientY - startY;
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    moved = true;
                    if (!touchDragging) clearTimeout(longPressTimer);
                }
                if (touchDragging) {
                    applyMove(t.clientX, t.clientY);
                    e.preventDefault();
                }
            }, { passive: false });

            el.addEventListener('touchend', () => {
                clearTimeout(longPressTimer);
                if (touchDragging) {
                    finishDrag();
                    touchDragging = false;
                } else if (!moved) {
                    openLightbox(el.currentSrc || el.src);
                }
            });
        });
    </script>
